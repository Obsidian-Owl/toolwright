name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -p 1 -parallel 2 ./... -count=1 -timeout 5m
        env:
          GOGC: 50

      - name: Race detection
        run: go test ./internal/auth/... ./internal/runner/... ./internal/schema/... -race -count=1 -timeout 5m

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          args: ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
