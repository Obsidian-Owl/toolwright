version: "2"

run:
  timeout: 5m
  go: "1.25"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errname
    - errorlint
    - govet
    - ineffassign
    - misspell
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        # defer Close() is idiomatic Go — errors are rarely actionable
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    staticcheck:
      checks:
        - all
        - -ST1000 # package comments — not required yet (constitution)
  exclusions:
    rules:
      # Test files: allow unused params (Go requires t *testing.T), skip noctx
      - path: _test\.go
        linters:
          - noctx
          - bodyclose
          - errcheck
      # Package comments not required yet — add when exporting public API
      - text: "package-comments"
        linters:
          - revive

